server {
    listen 80;
    server_name severbus.ru www.severbus.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name severbus.ru www.severbus.ru;

    ssl_certificate /etc/letsencrypt/live/severbus.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/severbus.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api {
        proxy_pass http://severbus-backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://severbus-backend:3000;
    }

    # Self-hosted map tiles (PMTiles + style.json + glyph PBFs).
    # Tomsk OFM/Protomaps build is blocked from RU networks, so we serve
    # the extracted region from disk. PMTiles uses HTTP Range requests —
    # nginx supports those by default for alias/root.
    location /tiles/ {
        alias /opt/severbus/data/tiles/;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Accept-Ranges bytes always;
        add_header Cache-Control "public, max-age=86400" always;

        types {
            application/json                 json;
            application/x-protobuf           pbf;
            application/octet-stream         pmtiles;
        }

        gzip on;
        gzip_types application/json application/x-protobuf;
    }

    location / {
        root /var/www/severbus;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

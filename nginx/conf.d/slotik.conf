server {
    listen 80;
    server_name slotik.tech www.slotik.tech admin.slotik.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name slotik.tech www.slotik.tech;

    ssl_certificate /etc/letsencrypt/live/slotik.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/slotik.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api/ {
        proxy_pass http://reservation-backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://reservation-backend:3000;
    }

    location = / {
        root /var/www/slotik-landing;
        try_files /index.html =404;
    }

    location /styles.css {
        root /var/www/slotik-landing;
    }

    location /media/ {
        root /var/www/slotik-landing;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        root /var/www/slotik;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    server_name admin.slotik.tech;

    ssl_certificate /etc/letsencrypt/live/slotik.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/slotik.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /admin/ {
        proxy_pass http://reservation-backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /var/www/slotik-admin;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
